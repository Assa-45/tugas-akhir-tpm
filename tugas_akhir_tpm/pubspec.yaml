name: chromame
description: Beauty & Color Personalization App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0

  # Auth & Security
  local_auth: ^2.1.7           # Biometric login (fingerprint / Face ID)
  encrypt: ^5.0.3              # AES-256 encryption
  crypto: ^3.0.3               # SHA hashing

  # Storage / Database
  hive: ^2.2.3                 # Local NoSQL database
  hive_flutter: ^1.1.0         # Hive Flutter adapter
  sqflite: ^2.3.0              # SQLite database
  path: ^1.8.3

  # Location & Maps
  geolocator: ^11.0.0          # GPS location
  geocoding: ^3.0.0            # Reverse geocoding
  google_maps_flutter: ^2.5.3  # Google Maps widget

  # Camera & Image
  camera: ^0.10.5              # Camera access
  image_picker: ^1.0.4         # Photo picker
  image: ^4.1.3                # Image processing

  # Sensors
  sensors_plus: ^4.0.2         # Accelerometer + Gyroscope

  # Networking
  http: ^1.1.0                 # HTTP client
  dio: ^5.3.3                  # Advanced HTTP (with interceptors)

  # State & Utils
  provider: ^6.1.1             # State management
  shared_preferences: ^2.2.2   # Simple key-value storage (session)
  intl: ^0.19.0                # Date/time/number formatting

  # Notifications
  flutter_local_notifications: ^16.3.0  # Local push notifications

  # Permissions
  permission_handler: ^11.1.0  # Runtime permissions

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/